<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=volume_up" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,400,0,0&icon_names=save" />
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Wordly</h1>
        <nav class="navbar">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <button id="fav-lib">Favourites</button>
            </ul>
        </nav>
    </header>
    
    <div id="dictionary">
        <div class="wrapper">
            <h1>Wordly Dictionary</h1>
            <p>THEE BEST PORTABLE LIBRARY</p>
            <input type="text" placeholder="Search for a word" id="search-input">
            <div class="buttons">
                <button id="clearbtn">Clear</button>
                <button id="searchbtn">Search</button>
                <button id="savebtn">Save</button>
            </div>
            <P class="directions">
                Type a word and press search to find out its <span>meaning</span> and <span>synonyms</span>.
            </P>
                <div class="content">
                    <ul id="word-list"></ul>    
                </div>
            
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
